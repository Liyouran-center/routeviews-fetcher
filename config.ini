[BGP下载器配置]

# 输出目录 - 下载的BGP文件将保存到这里
OUTPUT_DIR = ./bgp_data

# 是否保留压缩文件（true/false）
KEEP_COMPRESSED = false

# 网络请求超时时间（秒）
TIMEOUT = 30

# 日志级别 (DEBUG / INFO / WARNING / ERROR)
LOG_LEVEL = INFO

[RouteViews服务器配置]

# BaseURL - 通常不需要修改
BASE_URL = http://archive.routeviews.org/route-views2/bgpdata/

# 用户代理字符串
USER_AGENT = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

[下载选项]

# 下载缓冲区大小（字节）
CHUNK_SIZE = 1048576

# 是否在下载完成后自动删除压缩文件
AUTO_CLEANUP = false

# 最大重试次数
MAX_RETRIES = 5

[通知选项]

# 下载完成后是否显示完成通知
SHOW_COMPLETION_MESSAGE = true

# 是否记录详细日志
VERBOSE = false
