name: BGP Data Update

on:
  schedule:
    - cron: '10 16 * * *'  # 每天北京时间午夜10分（UTC 16:10）运行
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.0'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        sudo apt-get update && sudo apt-get install -y bgpdump jq  # 安装 bgpdump 用于解析 MRT 数据  安装 jq 用于处理 JSON 数据

    - name: Download and process BGP data
      run: |
        python download_bgp.py --keep --skip-mrt
        ls -la bgp_data/

    - name: 解码 AS Routes
      run: |
        # 使用 bgpdump -m 输出为 MRT 格式
        mv bgp_data/*.bz2 ./
        FILE=$(ls *.bz2 | head -n 1)
        OUTPUT_FILE="bgp_data/bgp_data.txt"

        echo "正在解码文件: $FILE"
        bunzip2 -c "$FILE" | bgpdump -m - > "$OUTPUT_FILE"

        echo "提取结果预览："
        head -n 20 bgp_data/bgp_data.txt
        echo "---"
        echo "总共提取到 $(wc -l < bgp_data/bgp_data.txt) 条路由"

    - name: 过滤 AS prefixes
      run: |
        # 找到最新的BGP数据文件
        LATEST_FILE=$(ls -t bgp_data/*.txt | head -1)
        if [ -n "$LATEST_FILE" ]; then
          echo "Processing file: $LATEST_FILE"
          python extract_as_prefixes.py "$LATEST_FILE" -A as_target.txt
        else
          echo "No BGP data file found"
          exit 1
        fi
        ls -la as_prefixes/

    - name: 生成汇总文件
      run: |
        echo "# BGP Data Update Summary" > README.md
        echo "" >> README.md
        echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> README.md
        echo "" >> README.md
        echo "## Generated Files" >> README.md
        echo "" >> README.md
        echo "### BGP Data Files" >> README.md
        ls -la bgp_data/ | grep -E '\.(bz2|gz|txt)$' | while read line; do
          echo "- $line" >> README.md
        done
        echo "" >> README.md
        echo "### AS Prefix Files" >> README.md
        ls -la as_prefixes/ | while read line; do
          echo "- $line" >> README.md
        done
        echo "" >> README.md
        echo "This file is automatically generated by GitHub Actions." >> README.md
        mv README.md as_prefixes/README.md

    # ⬆️ 上传步骤
    - name: Upload Data Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-bgp-data       # 给这个压缩包起个名字
        path: as_prefixes/      # 指定要上传的文件或文件夹路径
        retention-days: 1       # (可选) 保留天数，默认 90 天

  push-data:
    needs: generate-data
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ip-data

    - name: 清空分支内容
      run: |
        ls -A | grep -v -E '^(.git)$' | xargs -r rm -rf  # 删除除 AS信息外 的所有文件和目录


    # ⬇️ 下载步骤
    - name: Download Data Artifact
      uses: actions/download-artifact@v4
      with:
        name: my-bgp-data       # 名字必须和上面的一致
        path: ./as_prefixes   # 下载到当前目录的哪个文件夹

    - name: Commit and Push to ip-data
      run: |
        echo "🚀 开始推送到分支 ip-data..."

        # 1. 配置 Git 用户信息 (必须，否则 commit 会报错)
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

        mv as_prefixes/README.md ./

        echo "🔗 正在整合 as_prefixes 目录下的文本文件..."
        OUTPUT_FILE="all_as_prefixes.txt"
        cat $(ls -v as_prefixes/*.txt 2>/dev/null) > "$OUTPUT_FILE" || touch "$OUTPUT_FILE"
        echo "✅ 整合完成：$OUTPUT_FILE"
        echo "文件行数统计："
        wc -l "$OUTPUT_FILE"

        # 5. 添加所有变更文件
        ls -A
        git add -A

        # 6. 提交更改
        # 如果没有任何变更，git status 会显示 clean，此时 commit 会失败，所以我们先判断一下
        if git diff --staged --quiet; then
          echo "⚠️ 没有检测到文件变更，跳过提交。"
        else
          git commit -m "chore(data): 自动更新 BGP 数据及摘要 - $(date -u '+%Y-%m-%d %H:%M:%S')"

          # 7. 强制推送
          # 使用 -f (force) 是因为我们是用 Actions 生成的临时历史，强制覆盖远程分支通常是最简单的策略
          # 如果你担心覆盖别人的代码，可以去掉 -f，但那样容易因为历史不一致而报错
          git push origin ip-data -f
        fi
